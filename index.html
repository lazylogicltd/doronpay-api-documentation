<!doctype html>
<html lang="en" class="sl-theme-dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DoronPay API Documentation</title>

  <link rel="stylesheet" href="https://unpkg.com/@stoplight/elements/styles.min.css" />

  <style>
    :root {
      color-scheme: dark;

      --dp-bg: #000000;
      --dp-panel: #080808;
      --dp-panel-2: #101010;
      --dp-panel-3: #171717;
      --dp-border: rgba(255, 255, 255, 0.16);
      --dp-border-strong: rgba(255, 255, 255, 0.24);
      --dp-text: #ffffff;
      --dp-text-soft: #f5f5f5;
      --dp-muted: #d4d4d4;
      --dp-muted-2: #a3a3a3;
      --dp-accent: #22c55e;
      --dp-accent-light: #4ade80;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #000000;
      color: var(--dp-text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.08), transparent 30%),
        #000000;
    }

    .topbar {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 20px;
      background: rgba(0, 0, 0, 0.94);
      border-bottom: 1px solid var(--dp-border);
      color: var(--dp-text);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(16px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 240px;
    }

    .logo-mark {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #ff9c07, #e38203);
      color: #000000;
      font-weight: 900;
      letter-spacing: -0.05em;
      box-shadow: 0 0 30px rgba(34, 197, 94, 0.25);
    }

    .brand-copy {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .brand-copy strong {
      font-size: 16px;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: #ffffff;
    }

    .brand-copy span {
      font-size: 13px;
      color: #d4d4d4;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .actions a,
    .actions button {
      border: 1px solid var(--dp-border);
      background: #0c0c0c;
      color: #ffffff;
      border-radius: 999px;
      padding: 8px 13px;
      font-size: 13px;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 150ms ease, background 150ms ease, transform 150ms ease;
    }

    .actions a:hover,
    .actions button:hover {
      border-color: rgba(34, 197, 94, 0.9);
      background: #151515;
      transform: translateY(-1px);
    }

    #error {
      display: none;
      margin: 20px;
      padding: 16px 18px;
      border-radius: 14px;
      border: 1px solid rgba(248, 113, 113, 0.45);
      background: rgba(127, 29, 29, 0.3);
      color: #fecaca;
      line-height: 1.55;
    }

    #error strong {
      display: block;
      margin-bottom: 8px;
      color: #ffffff;
    }

    .docs-shell {
      height: calc(100vh - 68px);
      background: #000000;
      overflow: hidden;
    }

    elements-api {
      display: block;
      height: 100%;
      background: #000000;
      color: #ffffff;
    }

    /*
      Strong black theme overrides for Stoplight Elements.
      This fixes low-contrast text, muted labels, sidebar items,
      code examples, request panels, schema tables, and tabs.
    */
    elements-api,
    elements-api * {
      --color-canvas: #000000 !important;
      --color-canvas-100: #050505 !important;
      --color-canvas-200: #0a0a0a !important;
      --color-canvas-300: #111111 !important;
      --color-canvas-400: #171717 !important;

      --color-text: #ffffff !important;
      --color-text-weak: #f5f5f5 !important;
      --color-text-weaker: #d4d4d4 !important;
      --color-text-weakest: #b5b5b5 !important;

      --color-border: rgba(255, 255, 255, 0.16) !important;
      --color-border-dark: rgba(255, 255, 255, 0.22) !important;

      --color-primary: #22c55e !important;
      --color-primary-dark: #16a34a !important;
      --color-primary-light: rgba(34, 197, 94, 0.18) !important;

      color: #ffffff !important;
    }

    elements-api .sl-elements,
    elements-api .sl-flex,
    elements-api .sl-stack,
    elements-api .sl-panel,
    elements-api .sl-bg-canvas,
    elements-api .sl-bg-canvas-100,
    elements-api .sl-bg-canvas-200,
    elements-api .sl-bg-canvas-300,
    elements-api .sl-bg-canvas-400 {
      background-color: #000000 !important;
      color: #ffffff !important;
    }

    elements-api [class*="sl-bg-canvas"] {
      background-color: #000000 !important;
      color: #ffffff !important;
    }

    elements-api [class*="sl-bg-muted"],
    elements-api [class*="sl-bg-neutral"],
    elements-api [class*="sl-bg-warning"],
    elements-api [class*="sl-bg-success"],
    elements-api [class*="sl-bg-danger"],
    elements-api [class*="sl-bg-info"] {
      color: #ffffff !important;
    }

    elements-api [class*="sl-text"],
    elements-api p,
    elements-api span,
    elements-api div,
    elements-api li,
    elements-api td,
    elements-api th,
    elements-api label,
    elements-api summary,
    elements-api details,
    elements-api h1,
    elements-api h2,
    elements-api h3,
    elements-api h4,
    elements-api h5,
    elements-api h6 {
      color: #ffffff !important;
    }

    elements-api small,
    elements-api [class*="weak"],
    elements-api [class*="muted"],
    elements-api [class*="secondary"],
    elements-api [class*="description"] {
      color: #d4d4d4 !important;
    }

    elements-api a {
      color: #4ade80 !important;
    }

    elements-api pre,
    elements-api code,
    elements-api textarea,
    elements-api input,
    elements-api select {
      background-color: #080808 !important;
      color: #ffffff !important;
      border-color: rgba(255, 255, 255, 0.18) !important;
    }

    elements-api pre *,
    elements-api code * {
      color: #f5f5f5 !important;
    }

    elements-api table,
    elements-api thead,
    elements-api tbody,
    elements-api tr,
    elements-api td,
    elements-api th {
      background-color: #000000 !important;
      border-color: rgba(255, 255, 255, 0.14) !important;
      color: #ffffff !important;
    }

    elements-api button,
    elements-api [role="button"],
    elements-api [class*="sl-button"] {
      color: #ffffff !important;
      border-color: rgba(255, 255, 255, 0.18) !important;
    }

    elements-api [class*="sl-border"] {
      border-color: rgba(255, 255, 255, 0.16) !important;
    }

    elements-api input::placeholder,
    elements-api textarea::placeholder {
      color: #a3a3a3 !important;
    }

    elements-api ::selection {
      background: rgba(34, 197, 94, 0.32);
      color: #ffffff;
    }

    elements-api ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    elements-api ::-webkit-scrollbar-track {
      background: #000000;
    }

    elements-api ::-webkit-scrollbar-thumb {
      background: #2a2a2a;
      border-radius: 999px;
      border: 2px solid #000000;
    }

    elements-api ::-webkit-scrollbar-thumb:hover {
      background: #404040;
    }

    @media (max-width: 720px) {
      .topbar {
        height: auto;
        align-items: flex-start;
        flex-direction: column;
      }

      .docs-shell {
        height: calc(100vh - 122px);
      }

      .actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo-mark">D</div>
      <div class="brand-copy">
        <strong>DoronPay API Documentation</strong>
        <span>Unified API Reference</span>
      </div>
    </div>

    <div class="actions">
      <a href="./doronpay-unified-api.github-pages.json" target="_blank" rel="noopener">Open JSON</a>
      <button type="button" onclick="location.reload()">Reload</button>
    </div>
  </header>

  <div id="error"></div>

  <main class="docs-shell">
    <elements-api
      apiDescriptionUrl="./doronpay-unified-api.github-pages.json"
      router="hash"
      layout="sidebar"
      tryItCredentialsPolicy="same-origin">
    </elements-api>
  </main>

  <script>
    const SPEC_URL = './doronpay-unified-api.github-pages.json';

    function showError(message) {
      const el = document.getElementById('error');
      el.style.display = 'block';
      el.innerHTML = '<strong>Documentation failed to load.</strong>' + message;
    }

    async function verifySpec() {
      const response = await fetch(SPEC_URL, { cache: 'no-store' });

      if (!response.ok) {
        throw new Error(
          'Could not load <code>' + SPEC_URL + '</code>. HTTP status: ' + response.status +
          '. Make sure the JSON file is beside <code>index.html</code>.'
        );
      }

      try {
        await response.clone().json();
      } catch (error) {
        throw new Error('The JSON file was found, but it is not valid JSON.');
      }
    }

    window.addEventListener('error', function (event) {
      showError('Browser error: <code>' + event.message + '</code>');
    });

    verifySpec().catch(function (error) {
      showError(error.message);
    });
  </script>

  <script src="https://unpkg.com/@stoplight/elements/web-components.min.js"></script>
</body>
</html>
