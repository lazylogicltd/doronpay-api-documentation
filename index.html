<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DoronPay Unified API Docs</title>

  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    body { margin: 0; background: #fafafa; }
    #topbar {
      padding: 14px 18px;
      font-family: Arial, sans-serif;
      background: #111827;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
    }
    #status {
      padding: 12px 18px;
      font-family: Arial, sans-serif;
      background: #fff7ed;
      color: #9a3412;
      display: none;
      white-space: pre-wrap;
    }
    #swagger-ui { max-width: 1460px; margin: 0 auto; }
  </style>
</head>
<body>
  <div id="topbar">DoronPay Unified API Docs</div>
  <div id="status"></div>
  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    const SPEC_URL = './doronpay-unified-api.github-pages.json';
    const statusBox = document.getElementById('status');

    function showError(message) {
      statusBox.style.display = 'block';
      statusBox.textContent = message;
    }

    async function boot() {
      try {
        const response = await fetch(SPEC_URL, { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`Could not load ${SPEC_URL}. HTTP ${response.status}. Make sure the JSON file is in the same folder as index.html and the filename matches exactly.`);
        }

        const spec = await response.json();

        if (!spec.openapi || !spec.info || !spec.paths) {
          throw new Error('The JSON loaded, but it does not look like a valid OpenAPI document.');
        }

        SwaggerUIBundle({
          spec,
          dom_id: '#swagger-ui',
          deepLinking: true,
          presets: [SwaggerUIBundle.presets.apis],
          layout: 'BaseLayout'
        });
      } catch (error) {
        showError(`API docs failed to load.\n\n${error.message}`);
        console.error(error);
      }
    }

    boot();
  </script>
</body>
</html>
